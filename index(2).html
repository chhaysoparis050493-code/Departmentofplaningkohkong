<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <title>របាយការណ៍ផែនការយុទ្ធសាស្រ្តអភិវឌ្ឍន៍ខេត្តកោះកុង ២០២៥</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 p-8 font-sans text-gray-800">
    <div class="max-w-6xl mx-auto bg-white p-10 shadow-2xl rounded-2xl border border-gray-100">
        <header class="text-center mb-10 border-b pb-6">
            <h1 class="text-3xl font-bold text-blue-900">របាយការណ៍ផែនការយុទ្ធសាស្រ្តអភិវឌ្ឍន៍ខេត្តកោះកុង</h1>
            <p class="text-lg text-gray-600 mt-2">ឆ្នាំ ២០២៥ - វិស័យប្រជាសាស្រ្ត និងសុខភាពសាធារណៈ</p>
        </header>

        <!-- តារាងសូចនាករថ្មី -->
        <section class="mb-10">
            <h2 class="text-xl font-bold text-blue-800 mb-4">ស្ថិតិកំណើត និងមរណភាពតាមស្រុក</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm border-collapse border border-gray-200">
                    <thead class="bg-blue-700 text-white">
                        <tr>
                            <th class="p-2 border">ស្រុក/ក្រុង</th>
                            <th class="p-2 border">កំណើត (នាក់)</th>
                            <th class="p-2 border">មរណភាព (នាក់)</th>
                            <th class="p-2 border">អត្រាកំណើនធម្មជាតិ</th>
                        </tr>
                    </thead>
                    <tbody id="vital-data-body"></tbody>
                </table>
            </div>
        </section>

        <!-- ក្រាហ្វិក -->
        <section class="mb-10 grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="h-64"><canvas id="barChart"></canvas></div>
            <div class="h-64"><canvas id="vitalChart"></canvas></div>
        </section>

        <div class="text-center">
            <button onclick="exportDoc()" class="bg-blue-900 text-white px-10 py-4 rounded-full font-bold hover:bg-blue-700 transition">ទាញយកឯកសារ MS-Word</button>
        </div>
    </div>

    <script>
        const data = [
            {n: "បុទុមសាគរ", p: 24574, birth: 410, death: 85},
            {n: "គិរីសាគរ", p: 8388, birth: 140, death: 30},
            {n: "កោះកុង", p: 9395, birth: 160, death: 40},
            {n: "ខេមរភូមិន្ទ", p: 38504, birth: 650, death: 120},
            {n: "មណ្ឌលសីមា", p: 19006, birth: 320, death: 65},
            {n: "ស្រែអំបិល", p: 49344, birth: 850, death: 150},
            {n: "ថ្មបាំង", p: 9145, birth: 155, death: 35}
        ];

        function render() {
            const body = document.getElementById('vital-data-body');
            body.innerHTML = data.map(d => `<tr><td class="p-2 border font-bold">${d.n}</td><td class="p-2 border">${d.birth}</td><td class="p-2 border">${d.death}</td><td class="p-2 border">${(d.birth - d.death)}</td></tr>`).join('');
            
            // ក្រាហ្វិកប្រជាជន
            const ctx1 = document.getElementById('barChart').getContext('2d');
            new Chart(ctx1, { type: 'bar', data: { labels: data.map(d => d.n), datasets: [{ label: 'ចំនួនប្រជាជន', data: data.map(d => d.p), backgroundColor: '#1e40af' }] } });

            // ក្រាហ្វិកកំណើតមរណភាព
            const ctx2 = document.getElementById('vitalChart').getContext('2d');
            new Chart(ctx2, { 
                type: 'line', 
                data: { 
                    labels: data.map(d => d.n), 
                    datasets: [
                        { label: 'កំណើត', data: data.map(d => d.birth), borderColor: '#059669', fill: false },
                        { label: 'មរណភាព', data: data.map(d => d.death), borderColor: '#dc2626', fill: false }
                    ] 
                } 
            });
        }

        function exportDoc() {
            const content = document.querySelector('.max-w-6xl').innerHTML;
            const blob = new Blob(['\ufeff', content], {type: 'application/msword'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'របាយការណ៍_ប្រជាសាស្ត្រ_កោះកុង_២០២៥.doc';
            link.click();
        }

        render();
    </script>
</body>
</html>
